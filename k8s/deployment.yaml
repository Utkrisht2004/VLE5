apiVersion: apps/v1
kind: Deployment
metadata:
  name: bitedash-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bitedash
  template:
    metadata:
      labels:
        app: bitedash
    spec:
      containers:
      - name: bitedash-container
        image: nginx:latest
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: bitedash-service
spec:
  type: NodePort
  selector:
    app: bitedash
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30001